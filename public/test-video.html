<!DOCTYPE html>
<html>
<head>
    <title>Video Test - Getrimmt</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
        }
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            opacity: 0.5;
        }
        .overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            z-index: 10;
            text-align: center;
        }
    </style>
</head>
<body>
    <video autoplay loop muted playsinline>
        <source src="/assets/animated-background.mp4?v=2" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="overlay">
        VIDEO TEST<br>
        <span style="font-size: 24px;">Getrimmt - Smoother Loop</span>
    </div>
</body>
</html>
